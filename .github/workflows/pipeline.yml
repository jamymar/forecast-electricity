name: Daily Pipeline

on:
  schedule:
    - cron: '0 0 * * *'
  workflow_dispatch:

jobs:
  run-pipeline:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.14'

      - name: Install dependencies
        run: pip install psycopg2-binary pandas requests python-dotenv

      - name: Create logs directory
        run: mkdir -p logs

      - name: Run fetch_data
        env:
          SUPABASE_HOST: ${{ secrets.SUPABASE_HOST }}
          SUPABASE_DB: ${{ secrets.SUPABASE_DB }}
          SUPABASE_USER: ${{ secrets.SUPABASE_USER }}
          SUPABASE_PASSWORD: ${{ secrets.SUPABASE_PASSWORD }}
          SUPABASE_PORT: ${{ secrets.SUPABASE_PORT }}
          RTE_USERNAME: ${{ secrets.RTE_USERNAME }}
          RTE_PASSWORD: ${{ secrets.RTE_PASSWORD }}
        run: python -m scripts.fetch_data

      - name: Run fetch_rte_forecast (RTE Benchmark)
        env:
          SUPABASE_HOST: ${{ secrets.SUPABASE_HOST }}
          SUPABASE_DB: ${{ secrets.SUPABASE_DB }}
          SUPABASE_USER: ${{ secrets.SUPABASE_USER }}
          SUPABASE_PASSWORD: ${{ secrets.SUPABASE_PASSWORD }}
          SUPABASE_PORT: ${{ secrets.SUPABASE_PORT }}
          RTE_USERNAME: ${{ secrets.RTE_USERNAME }} 
          RTE_PASSWORD: ${{ secrets.RTE_PASSWORD }}
        
        run: python -m scripts.fetch_rte_forecast